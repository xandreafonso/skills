document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6999a83a-853c-443c-aef3-66ad3f84a2c6\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"5e318d48-0c24-4ded-b7b7-b84d78e592cc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b17fb97d-3798-4772-b233-703ac61850f0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ====== BRAND COLORS ============================== */\n  /* Navy — primary brand color. #1a2a4a is the anchor.\n     Variants are tuned by hand, not algorithmic shifts.   */\n  --navy-50:  #e8edf5;\n  --navy-100: #c5d0e3;\n  --navy-200: #8fa1c0;\n  --navy-300: #5a729e;\n  --navy-400: #34507f;\n  --navy-500: #1a2a4a;   /* anchor */\n  --navy-600: #15233e;\n  --navy-700: #101b30;\n  --navy-800: #0b1322;\n  --navy-900: #060b16;\n  --navy-950: #03070f;\n\n  /* Amber — accent. CTAs, highlights, data emphasis.\n     Used sparingly. Never on body text.                   */\n  --amber-300: #fcd34d;\n  --amber-400: #fbbf24;\n  --amber-500: #f59e0b;   /* anchor */\n  --amber-600: #d97706;\n  --amber-700: #b45309;\n\n  /* Neutrals (cool-leaning to harmonize with navy) */\n  --neutral-0:    #ffffff;\n  --neutral-50:   #f5f7fa;\n  --neutral-100:  #e6ebf2;\n  --neutral-200:  #c8d1de;\n  --neutral-300:  #9aa6b8;\n  --neutral-400:  #6c7a90;\n  --neutral-500:  #4a566a;\n  --neutral-600:  #313b4d;\n  --neutral-700:  #1f2737;\n  --neutral-800:  #131a27;\n  --neutral-900:  #0a0f1a;\n\n  /* Semantic ============================================ */\n  --color-bg:           var(--navy-900);          /* canvas */\n  --color-bg-elevated:  var(--navy-800);          /* cards/surface */\n  --color-bg-sunken:    var(--navy-950);          /* code blocks, wells */\n  --color-bg-overlay:   rgba(6, 11, 22, 0.72);    /* modal scrim */\n\n  --color-surface:        #0e172a;                /* default card */\n  --color-surface-hover:  #142039;\n  --color-surface-active: #1a2a4a;\n\n  --color-border:         rgba(255, 255, 255, 0.07);\n  --color-border-strong:  rgba(255, 255, 255, 0.14);\n  --color-border-focus:   var(--amber-500);\n\n  --color-fg:           #eef2f9;     /* primary text */\n  --color-fg-muted:     #a9b4c8;     /* secondary text */\n  --color-fg-subtle:    #6b7894;     /* tertiary, captions */\n  --color-fg-disabled:  #404a5c;\n  --color-fg-on-amber:  #1a1102;     /* text on amber pills/buttons */\n\n  --color-accent:        var(--amber-500);\n  --color-accent-hover:  var(--amber-400);\n  --color-accent-press:  var(--amber-600);\n  --color-accent-soft:   rgba(245, 158, 11, 0.12);\n\n  --color-link:          var(--amber-400);\n  --color-link-hover:    var(--amber-300);\n\n  /* Status — desaturated to fit corporate tone */\n  --color-success: #2da472;\n  --color-warning: #d4a015;\n  --color-danger:  #c4474a;\n  --color-info:    #4d7cc2;\n\n  /* ====== TYPOGRAPHY =================================== */\n  --font-sans: \"Geist\", ui-sans-serif, -apple-system, BlinkMacSystemFont,\n               \"Segoe UI\", system-ui, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas,\n               \"Liberation Mono\", monospace;\n\n  /* Type scale — modular, 1.250 (major third) but slightly compressed\n     at top for screens. Display sizes use larger jumps for slides.    */\n  --fs-xs:    12px;\n  --fs-sm:    13px;\n  --fs-base:  15px;\n  --fs-md:    17px;\n  --fs-lg:    20px;\n  --fs-xl:    24px;\n  --fs-2xl:   30px;\n  --fs-3xl:   38px;\n  --fs-4xl:   48px;\n  --fs-5xl:   62px;\n  --fs-6xl:   80px;\n  --fs-display: 112px;\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.45;\n  --lh-relaxed: 1.6;\n  --lh-loose:   1.75;\n\n  --tracking-tightest: -0.04em;\n  --tracking-tighter:  -0.025em;\n  --tracking-tight:    -0.012em;\n  --tracking-normal:   0;\n  --tracking-wide:     0.04em;\n  --tracking-wider:    0.08em;\n  --tracking-widest:   0.18em;     /* eyebrow / kicker */\n\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-black:    800;\n\n  /* ====== SPACING (4px base) =========================== */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n  --space-32: 128px;\n\n  /* ====== RADII ======================================== */\n  /* Restrained. Premium consulting reads as small radii,\n     not big rounded blobs. Pills only for tags/badges.   */\n  --radius-xs:  2px;\n  --radius-sm:  4px;\n  --radius-md:  6px;\n  --radius-lg:  10px;\n  --radius-xl:  14px;\n  --radius-2xl: 20px;\n  --radius-pill: 999px;\n\n  /* ====== ELEVATION ==================================== */\n  /* On dark, we lean on borders + subtle inner highlights\n     more than drop shadows. Shadows are deep+soft, never glow. */\n  --shadow-xs: 0 1px 0 rgba(255,255,255,0.04) inset,\n               0 1px 2px rgba(0,0,0,0.4);\n  --shadow-sm: 0 1px 0 rgba(255,255,255,0.04) inset,\n               0 2px 6px rgba(0,0,0,0.35);\n  --shadow-md: 0 1px 0 rgba(255,255,255,0.05) inset,\n               0 8px 24px rgba(0,0,0,0.45);\n  --shadow-lg: 0 1px 0 rgba(255,255,255,0.06) inset,\n               0 20px 50px rgba(0,0,0,0.55);\n  --shadow-xl: 0 1px 0 rgba(255,255,255,0.06) inset,\n               0 32px 80px rgba(0,0,0,0.6);\n  --shadow-amber: 0 0 0 1px rgba(245,158,11,0.35),\n                  0 12px 32px rgba(245,158,11,0.18);\n\n  /* ====== MOTION ======================================= */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-in:     cubic-bezier(0.55, 0, 0.8, 0.2);\n\n  --dur-instant: 80ms;\n  --dur-fast:    160ms;\n  --dur-normal:  240ms;\n  --dur-slow:    420ms;\n  --dur-page:    600ms;\n\n  /* ====== LAYOUT ======================================= */\n  --container-narrow: 720px;\n  --container:        1080px;\n  --container-wide:   1280px;\n  --container-full:   1440px;\n}\n\n/* =============================================================\n   Element defaults (semantic styles, scoped under .ds-prose\n   or as base resets you can opt into).\n   ============================================================= */\n\nhtml {\n  color-scheme: dark;\n  background: var(--color-bg);\n  color: var(--color-fg);\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  font-feature-settings: \"ss01\", \"cv11\", \"calt\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  margin: 0;\n  background: var(--color-bg);\n  color: var(--color-fg);\n}\n\n::selection { background: var(--amber-500); color: var(--color-fg-on-amber); }\n\n/* Semantic typography classes. Use these instead of raw tags\n   when you need consistent treatment across the system.       */\n\n.h-display {\n  font-family: var(--font-sans);\n  font-size: clamp(56px, 8vw, var(--fs-display));\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-tightest);\n  line-height: 0.95;\n  color: var(--color-fg);\n}\n\ aringly. Never on body text.                   */\n  --amber-300: #fcd34d;\n  --amber-400: #fbbf24;\n  --amber-500: #f59e0b;   /* anchor */\n  --amber-600: #d97706;\n  --amber-700: #b45309;\n\n  /* Neutrals (cool-leaning to harmonize with navy) */\n  --neutral-0:    #ffffff;\n  --neutral-50:   #f5f7fa;\n  --neutral-100:  #e6ebf2;\n  --neutral-200:  #c8d1de;\n  --neutral-300:  #9aa6b8;\n  --neutral-400:  #6c7a90;\n  --neutral-500:  #4a566a;\n  --neutral-600:  #313b4d;\n  --neutral-700:  #1f2737;\n  --neutral-800:  #131a27;\n  --neutral-900:  #0a0f1a;\n\n  /* Semantic ============================================ */\n  --color-bg:           var(--navy-900);          /* canvas */\n  --color-bg-elevated:  var(--navy-800);          /* cards/surface */\n  --color-bg-sunken:    var(--navy-950);          /* code blocks, wells */\n  --color-bg-overlay:   rgba(6, 11, 22, 0.72);    /* modal scrim */\n\n  --color-surface:        #0e172a;                /* default card */\n  --color-surface-hover:  #142039;\n  --color-surface-active: #1a2a4a;\n\n  --color-border:         rgba(255, 255, 255, 0.07);\n  --color-border-strong:  rgba(255, 255, 255, 0.14);\n  --color-border-focus:   var(--amber-500);\n\n  --color-fg:           #eef2f9;     /* primary text */\n  --color-fg-muted:     #a9b4c8;     /* secondary text */\n  --color-fg-subtle:    #6b7894;     /* tertiary, captions */\n  --color-fg-disabled:  #404a5c;\n  --color-fg-on-amber:  #1a1102;     /* text on amber pills/buttons */\n\n  --color-accent:        var(--amber-500);\n  --color-accent-hover:  var(--amber-400);\n  --color-accent-press:  var(--amber-600);\n  --color-accent-soft:   rgba(245, 158, 11, 0.12);\n\n  --color-link:          var(--amber-400);\n  --color-link-hover:    var(--amber-300);\n\n  /* Status — desaturated to fit corporate tone */\n  --color-success: #2da472;\n  --color-warning: #d4a015;\n  --color-danger:  #c4474a;\n  --color-info:    #4d7cc2;\n\n  /* ====== TYPOGRAPHY =================================== */\n  --font-sans: \"Geist\", ui-sans-serif, -apple-system, BlinkMacSystemFont,\n               \"Segoe UI\", system-ui, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas,\n               \"Liberation Mono\", monospace;\n\n  /* Type scale — modular, 1.250 (major third) but slightly compressed\n     at top for screens. Display sizes use larger jumps for slides.    */\n  --fs-xs:    12px;\n  --fs-sm:    13px;\n  --fs-base:  15px;\n  --fs-md:    17px;\n  --fs-lg:    20px;\n  --fs-xl:    24px;\n  --fs-2xl:   30px;\n  --fs-3xl:   38px;\n  --fs-4xl:   48px;\n  --fs-5xl:   62px;\n  --fs-6xl:   80px;\n  --fs-display: 112px;\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.45;\n  --lh-relaxed: 1.6;\n  --lh-loose:   1.75;\n\n  --tracking-tightest: -0.04em;\n  --tracking-tighter:  -0.025em;\n  --tracking-tight:    -0.012em;\n  --tracking-normal:   0;\n  --tracking-wide:     0.04em;\n  --tracking-wider:    0.08em;\n  --tracking-widest:   0.18em;     /* eyebrow / kicker */\n\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-black:    800;\n\n  /* ====== SPACING (4px base) =========================== */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n  --space-32: 128px;\n\n  /* ====== RADII ======================================== */\n  /* Restrained. Premium consulting reads as small radii,\n     not big rounded blobs. Pills only for tags/badges.   */\n  --radius-xs:  2px;\n  --radius-sm:  4px;\n  --radius-md:  6px;\n  --radius-lg:  10px;\n  --radius-xl:  14px;\n  --radius-2xl: 20px;\n  --radius-pill: 999px;\n\n  /* ====== ELEVATION ==================================== */\n  /* On dark, we lean on borders + subtle inner highlights\n     more than drop shadows. Shadows are deep+soft, never glow. */\n  --shadow-xs: 0 1px 0 rgba(255,255,255,0.04) inset,\n               0 1px 2px rgba(0,0,0,0.4);\n  --shadow-sm: 0 1px 0 rgba(255,255,255,0.04) inset,\n               0 2px 6px rgba(0,0,0,0.35);\n  --shadow-md: 0 1px 0 rgba(255,255,255,0.05) inset,\n               0 8px 24px rgba(0,0,0,0.45);\n  --shadow-lg: 0 1px 0 rgba(255,255,255,0.06) inset,\n               0 20px 50px rgba(0,0,0,0.55);\n  --shadow-xl: 0 1px 0 rgba(255,255,255,0.06) inset,\n               0 32px 80px rgba(0,0,0,0.6);\n  --shadow-amber: 0 0 0 1px rgba(245,158,11,0.35),\n                  0 12px 32px rgba(245,158,11,0.18);\n\n  /* ====== MOTION ======================================= */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-in:     cubic-bezier(0.55, 0, 0.8, 0.2);\n\n  --dur-instant: 80ms;\n  --dur-fast:    160ms;\n  --dur-normal:  240ms;\n  --dur-slow:    420ms;\n  --dur-page:    600ms;\n\n  /* ====== LAYOUT ======================================= */\n  --container-narrow: 720px;\n  --container:        1080px;\n  --container-wide:   1280px;\n  --container-full:   1440px;\n}\n\n/* =============================================================\n   Element defaults (semantic styles, scoped under .ds-prose\n   or as base resets you can opt into).\n   ============================================================= */\n\nhtml {\n  color-scheme: dark;\n  background: var(--color-bg);\n  color: var(--color-fg);\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  font-feature-settings: \"ss01\", \"cv11\", \"calt\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  margin: 0;\n  background: var(--color-bg);\n  color: var(--color-fg);\n}\n\n::selection { background: var(--amber-500); color: var(--color-fg-on-amber); }\n\n/* Semantic typography classes. Use these instead of raw tags\n   when you need consistent treatment across the system.       */\n\n.h-display {\n  font-family: var(--font-sans);\n  font-size: clamp(56px, 8vw, var(--fs-display));\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-tightest);\n  line-height: 0.95;\n  color: var(--color-fg);\n}\n\n.h1 {\n  font-size: clamp(36px, 5vw, var(--fs-4xl));\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-tighter);\n  line-height: var(--lh-tight);\n  color: var(--color-fg);\n}\n\n.h2 {\n  font-size: var(--fs-3xl);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--lh-snug);\n  color: var(--color-fg);\n}\n\n.h3 {\n  font-size: var(--fs-2xl);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--lh-snug);\n  color: var(--color-fg);\n}\n\n.h4 {\n  font-size: var(--fs-xl);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-tight);\n  line-height: var(--lh-snug);\n  color: var(--color-fg);\n}\n\n.h5 {\n  font-size: var(--fs-lg);\n  font-weight: var(--weight-semibold);\n  line-height: var(--lh-snug);\n  color: var(--color-fg);\n}\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--fs-xs);\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-widest);\n  text-transform: uppercase;\n  color: var(--color-accent);\n}\n\n.lede {\n  font-size: var(--fs-lg);\n  line-height: var(--lh-relaxed);\n  color: var(--color-fg-muted);\n  font-weight: var(--weight-regular);\n  letter-spacing: var(--tracking-tight);\n}\n\n.body { font-size: var(--fs-base); line-height: var(--lh-relaxed); color: var(--color-fg); }\n.body-muted { font-size: var(--fs-base); line-height: var(--lh-relaxed); color: var(--color-fg-muted); }\n.small { font-size: var(--fs-sm); line-height: var(--lh-normal); color: var(--color-fg-muted); }\n.caption { font-size: var(--fs-xs); line-height: var(--lh-normal); color: var(--color-fg-subtle); letter-spacing: var(--tracking-wide); }\n\n.mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  letter-spacing: 0;\n}\n\na { color: var(--color-link); text-decoration: none; transition: color var(--dur-fast) var(--ease-out); }\na:hover { color: var(--color-link-hover); }\n\n/* Tabular numerals (use on dashboards, tables, KPIs) */\n.tabular { font-variant-numeric: tabular-nums; }\n\n/* Hairline — premium consulting motif */\n.hairline { border-top: 1px solid var(--color-border); }\n.hairline-strong { border-top: 1px solid var(--color-border-strong); }\n\n\n/* ----- Buttons -------------------------------------------- */\n.btn {\n  display: inline-flex; align-items: center; gap: var(--space-2);\n  height: 40px; padding: 0 var(--space-5);\n  border-radius: var(--radius-md);\n  font-family: var(--font-sans);\n  font-size: var(--fs-sm);\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-tight);\n  border: 1px solid transparent;\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out),\n              border-color var(--dur-fast) var(--ease-out),\n              color var(--dur-fast) var(--ease-out),\n              transform var(--dur-fast) var(--ease-out);\n  user-select: none;\n  white-space: nowrap;\n}\n.btn:active { transform: translateY(0.5px); }\n.btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n\n.btn--primary {\n  background: var(--color-accent);\n  color: var(--color-fg-on-amber);\n  border-color: var(--color-accent);\n}\n.btn--primary:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }\n.btn--primary:active { background: var(--color-accent-press); border-color: var(--color-accent-press); }\n\n.btn--secondary {\n  background: transparent;\n  color: var(--color-fg);\n  border-color: var(--color-border-strong);\n}\n.btn--secondary:hover { background: var(--color-surface-hover); border-color: var(--color-border-strong); }\n\n.btn--ghost {\n  background: transparent;\n  color: var(--color-fg-muted);\n  border-color: transparent;\n}\n.btn--ghost:hover { color: var(--color-fg); background: var(--color-surface-hover); }\n\n.btn--lg { height: 48px; padding: 0 var(--space-6); font-size: var(--fs-base); }\n.btn--sm { height: 32px; padding: 0 var(--space-3); font-size: var(--fs-xs); }\n\n/* ----- Cards ---------------------------------------------- */\n.card {\n  background: var(--color-surface);\n  border: 1px solid var(--color-border);\n  border-radius: var(--radius-lg);\n  padding: var(--space-6);\n  transition: border-color var(--dur-normal) var(--ease-out),\n              background var(--dur-normal) var(--ease-out);\n}\n.card--hover:hover {\n  border-color: var(--color-border-strong);\n  background: var(--color-surface-hover);\n}\n.card--elevated {\n  background: var(--color-bg-elevated);\n  box-shadow: var(--shadow-md);\n}\n.card--bare { background: transparent; border-radius: 0; padding: 0; border: none; }\n\n/* ----- Inputs --------------------------------------------- */\n.field {\n  display: flex; flex-direction: column; gap: var(--space-2);\n}\n.field__label {\n  font-size: var(--fs-xs); font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-wide); text-transform: uppercase;\n  color: var(--color-fg-subtle);\n}\n.input, .textarea, .select {\n  background: var(--color-bg-sunken);\n  border: 1px solid var(--color-border);\n  color: var(--color-fg);\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  padding: 10px 12px;\n  border-radius: var(--radius-md);\n  outline: none;\n  transition: border-color var(--dur-fast) var(--ease-out),\n              background var(--dur-fast) var(--ease-out);\n  width: 100%;\n}\n.input:focus, .textarea:focus, .select:focus {\n  border-color: var(--color-accent);\n  background: var(--color-surface);\n}\n.textarea { min-height: 96px; resize: vertical; font-family: inherit; }\n\n/* ----- Badges / pills ------------------------------------- */\n.badge {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 22px; padding: 0 10px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  border-radius: var(--radius-pill);\n  border: 1px solid var(--color-border-strong);\n  color: var(--color-fg-muted);\n  background: transparent;\n}\n.badge--amber { color: var(--color-accent); border-color: rgba(245,158,11,0.4); background: var(--color-accent-soft); }\n.badge--solid { background: var(--color-accent); color: var(--color-fg-on-amber); border-color: var(--color-accent); }\n.badge--success { color: var(--color-success); border-color: color-mix(in oklab, var(--color-success) 60%, transparent); }\n.badge--neutral { color: var(--color-fg); border-color: var(--color-border-strong); }\n\n/* ----- Indicator dot -------------------------------------- */\n.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }\n.dot--pulse { box-shadow: 0 0 0 0 currentColor; animation: dot-pulse 1.8s var(--ease-out) infinite; }\n@keyframes dot-pulse {\n  0% { box-shadow: 0 0 0 0 color-mix(in oklab, currentColor 60%, transparent); }\n  70% { box-shadow: 0 0 0 6px transparent; }\n  100% { box-shadow: 0 0 0 0 transparent; }\n}\n\n/* ----- Hairline divider ----------------------------------- */\n.divider { height: 1px; background: var(--color-border); border: 0; margin: var(--space-6) 0; }\n.divider--strong { background: var(--color-border-strong); }\n\n/* ----- Tag (numbered or labeled, monospace) --------------- */\n.tag {\n  font-family: var(--font-mono);\n  font-size: var(--fs-xs);\n  letter-spacing: var(--tracking-wide);\n  color: var(--color-fg-subtle);\n  text-transform: uppercase;\n}\n\n/* ----- Section frame -------------------------------------- */\n.section {\n  padding: var(--space-20) var(--space-8);\n  border-top: 1px solid var(--color-border);\n}\n\n.container { max-width: var(--container); margin: 0 auto; }\n.container--narrow { max-width: var(--container-narrow); margin: 0 auto; }\n.container--wide { max-width: var(--container-wide); margin: 0 auto; }\n\n/* ----- Decorative grid backdrop --------------------------- */\n.bg-grid {\n  background-image:\n    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);\n  background-size: 64px 64px;\n}\n.bg-dot {\n  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);\n  background-size: 24px 24px;\n}\n\n/* ----- Focus ring helper ---------------------------------- */\n.focus-ring:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; border-radius: var(--radius-sm); }\n<\u002Fstyle>\n  <script src=\"35975c50-cc03-407a-aeef-eba4ea362e93\"><\u002Fscript>\n  <style>\n    :root {\n      --slide-pad-x: 96px;\n      --slide-pad-y: 80px;\n    }\n    html, body { background: #000; margin: 0; }\n    deck-stage { background: #000; }\n\n    /* Slide base */\n    .slide {\n      width: 100%; height: 100%;\n      background: var(--navy-900);\n      color: var(--color-fg);\n      padding: var(--slide-pad-y) var(--slide-pad-x);\n      box-sizing: border-box;\n      display: flex; flex-direction: column;\n      position: relative; overflow: hidden;\n      font-family: var(--font-sans);\n    }\n    .slide--dark { background: var(--navy-950); }\n    .slide--surface { background: var(--navy-800); }\n    .slide--center { justify-content: center; }\n\n    /* Grid backdrop */\n    .slide-grid::before {\n      content: \"\"; position: absolute; inset: 0; pointer-events: none;\n      background-image:\n        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),\n        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);\n      background-size: 80px 80px;\n      mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 75%);\n      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 75%);\n    }\n\n    /* Slide chrome (footer line) */\n    .slide-chrome {\n      position: absolute; left: var(--slide-pad-x); right: var(--slide-pad-x); bottom: 48px;\n      display: flex; justify-content: space-between; align-items: center;\n      font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.18em;\n      text-transform: uppercase; color: var(--color-fg-subtle);\n    }\n    .slide-chrome-brand { color: var(--color-fg-muted); display: flex; gap: 14px; }\n    .slide-chrome-brand b { color: var(--color-fg); font-weight: 600; letter-spacing: -0.02em; text-transform: none; font-family: var(--font-sans); font-size: 17px; }\n    .slide-chrome-brand .ia { color: var(--color-accent); }\n\n    /* Eyebrow */\n    .eyebrow-slide {\n      font-family: var(--font-mono); font-size: 16px; font-weight: 500;\n      letter-spacing: 0.22em; text-transform: uppercase;\n      color: var(--color-accent);\n      display: flex; align-items: center; gap: 18px;\n      margin-bottom: 56px;\n    }\n    .eyebrow-slide .bar { width: 48px; height: 1px; background: var(--color-accent); }\n\n    /* Typography */\n    .display {\n      font-size: 132px; font-weight: 500; letter-spacing: -0.04em;\n      line-height: 0.95; color: var(--color-fg); margin: 0;\n      text-wrap: balance;\n    }\n    .display em { font-style: normal; color: var(--color-accent); }\n    .h1-slide {\n      font-size: 92px; font-weight: 600; letter-spacing: -0.03em;\n      line-height: 1.02; margin: 0; text-wrap: balance;\n    }\n    .h2-slide {\n      font-size: 64px; font-weight: 600; letter-spacing: -0.025em;\n      line-height: 1.06; margin: 0;\n    }\n    .lede-slide {\n      font-size: 32px; line-height: 1.4; letter-spacing: -0.012em;\n      color: var(--color-fg-muted); max-width: 1280px; margin: 32px 0 0;\n      text-wrap: pretty;\n    }\n    .kicker {\n      font-family: var(--font-mono); font-size: 18px; font-weight: 500;\n      letter-spacing: 0.18em; text-transform: uppercase;\n      color: var(--color-fg-subtle);\n    }\n    .num-display {\n      font-variant-numeric: tabular-nums; font-weight: 500;\n      letter-spacing: -0.04em; color: var(--color-accent);\n      line-height: 1;\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <deck-stage>\n\n    <!-- ============ 01 · Title ============ -->\n    <section data-screen-label=\"01 Title\" class=\"slide slide-grid slide--center\" style=\"padding-left: 120px;\">\n      <div class=\"kicker\" style=\"margin-bottom: 56px;\">— Proposta comercial · v1.0 · confidencial<\u002Fdiv>\n      <h1 class=\"display\" style=\"max-width: 1480px;\">\n        Automação do atendimento de pós-venda <em>com IA<\u002Fem> para a Acme Tech.\n      <\u002Fh1>\n      <div style=\"display: flex; gap: 96px; margin-top: 80px;\">\n        <div>\n          <div class=\"kicker\">Para<\u002Fdiv>\n          <div style=\"font-size: 28px; font-weight: 600; margin-top: 12px; letter-spacing: -0.02em;\">Acme Tech<\u002Fdiv>\n          <div style=\"font-size: 18px; color: var(--color-fg-muted); margin-top: 4px;\">A/C Direção · Operações<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"kicker\">Por<\u002Fdiv>\n          <div style=\"font-size: 28px; font-weight: 600; margin-top: 12px; letter-spacing: -0.02em;\">Alexandre Afonso<\u002Fdiv>\n          <div style=\"font-size: 18px; color: var(--color-fg-muted); margin-top: 4px;\">ConsultorIA · CNPJ sob consulta<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"kicker\">Validade<\u002Fdiv>\n          <div style=\"font-size: 28px; font-weight: 600; margin-top: 12px; letter-spacing: -0.02em;\">30 dias<\u002Fdiv>\n          <div style=\"font-size: 18px; color: var(--color-fg-muted); margin-top: 4px;\">15 mai 2026 → 14 jun 2026<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-chrome\">\n        <div class=\"slide-chrome-brand\"><b>Alexandre<\u002Fb><span>Consultor<span class=\"ia\">IA<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <span>01 / 09<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 02 · Section divider ============ -->\n    <section data-screen-label=\"02 Section\" class=\"slide slide--dark slide--center\">\n      <div style=\"max-width: 1300px;\">\n        <div class=\"kicker\" style=\"color: var(--color-accent); margin-bottom: 48px;\">— Parte 01 / 03<\u002Fdiv>\n        <h1 class=\"h1-slide\">O contexto, do jeito que ele aparece na operação.<\u002Fh1>\n        <p class=\"lede-slide\">Antes de propor solução, registro como o processo de atendimento da Acme Tech funciona hoje — com base nas reuniões e materiais coletados.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-chrome\">\n        <div class=\"slide-chrome-brand\"><b>Alexandre<\u002Fb><span>Consultor<span class=\"ia\">IA<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <span>02 / 09<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 03 · Big quote / framing ============ -->\n    <section data-screen-label=\"03 Quote\" class=\"slide slide--center\" style=\"background: var(--navy-900);\">\n      <div style=\"position: absolute; inset: 0; background: radial-gradient(circle at 70% 40%, rgba(245,158,11,0.12), transparent 50%);\"><\u002Fdiv>\n      <div style=\"position: relative; max-width: 1500px;\">\n        <div style=\"font-size: 220px; color: var(--color-accent); line-height: 0.5; margin-bottom: 24px; opacity: 0.5; font-family: var(--font-sans); font-weight: 500;\">“<\u002Fdiv>\n        <p style=\"font-size: 68px; font-weight: 500; letter-spacing: -0.022em; line-height: 1.18; margin: 0; color: var(--color-fg); text-wrap: balance;\">\n          O que separa uma solução de IA que <em style=\"color: var(--color-accent); font-style: normal;\">funciona<\u002Fem> de uma demo é o contexto: o processo que ninguém documentou, os dados que vivem em planilhas, as decisões que dependem de duas pessoas.\n        <\u002Fp>\n        <div style=\"margin-top: 56px; font-family: var(--font-mono); font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-fg-subtle);\">— Alexandre Afonso · ConsultorIA<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-chrome\">\n        <div class=\"slide-chrome-brand\"><b>Alexandre<\u002Fb><span>Consultor<span class=\"ia\">IA<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <span>03 / 09<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 04 · Stats / impact ============ -->\n    <section data-screen-label=\"04 Stats\" class=\"slide\">\n      <div class=\"eyebrow-slide\"><span class=\"bar\"><\u002Fspan>Estado atual · diagnóstico Q1 2026<\u002Fdiv>\n      <h2 class=\"h2-slide\" style=\"max-width: 1200px; margin-bottom: 96px;\">A operação de atendimento da Acme Tech, hoje, em três números.<\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--color-border);\">\n        <div style=\"padding: 56px 56px 0 0; border-right: 1px solid var(--color-border);\">\n          <div class=\"num-display\" style=\"font-size: 184px;\">12<span style=\"font-size: 72px; color: var(--color-fg-muted);\"> h<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-fg-subtle); margin-top: 16px;\">SLA atual de primeira resposta<\u002Fdiv>\n          <div style=\"font-size: 18px; color: var(--color-fg-muted); margin-top: 16px; max-width: 360px; line-height: 1.5;\">Meta interna é 2h. Não foi batida em nenhum mês de 2025.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 56px; border-right: 1px solid var(--color-border);\">\n          <div class=\"num-display\" style=\"font-size: 184px;\">70<span style=\"font-size: 72px; color: var(--color-fg-muted);\"> %<\u002Fspan><\u002Fdiv>\n
