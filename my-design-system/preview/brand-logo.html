<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    body { padding: 0; background: var(--navy-900); }
    .stage { padding: 32px 28px; }
    .logo-name { font-family: var(--font-sans); font-weight: 500; letter-spacing: -0.04em; line-height: 0.9; }
    .logo-role { font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; }
    .row { display: flex; align-items: end; gap: 48px; }
    .row + .row { margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--color-border); }
    .swatch-label { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  </style>
  <div class="stage">
    <div class="row">
      <div>
        <div class="swatch-label">Lockup principal — dark</div>
        <div class="logo-name" style="font-size: 56px; color: #eef2f9;">Alexandre</div>
        <div class="logo-role" style="font-size: 11px; color: var(--color-fg-muted); margin-top: 6px;">Consultor<span style="color: var(--color-accent)">IA</span></div>
      </div>
      <div>
        <div class="swatch-label">Mark</div>
        <div style="display:flex; align-items:center; justify-content:center; width: 64px; height: 64px; background: var(--color-accent); border-radius: var(--radius-md); color: var(--color-fg-on-amber); font-family: var(--font-sans); font-weight: 700; font-size: 30px; letter-spacing: -0.06em;">aa</div>
      </div>
    </div>
  </div>
</body></html>
