<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    body { padding: 24px; }
    .grid { display: grid; grid-template-columns: 60px 1fr; gap: 14px 18px; align-items: center; }
    .label { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); }
    .bar { background: var(--color-accent-soft); border-left: 2px solid var(--color-accent); height: 16px; border-radius: 0 var(--radius-xs) var(--radius-xs) 0; display: flex; align-items: center; padding-right: 8px; justify-content: flex-end; font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-muted); }
  </style>
  <div class="grid">
    <div class="label">space-1</div><div class="bar" style="width: 4px;"></div>
    <div class="label">space-2</div><div class="bar" style="width: 8px;"></div>
    <div class="label">space-3</div><div class="bar" style="width: 12px;"></div>
    <div class="label">space-4</div><div class="bar" style="width: 16px;">16</div>
    <div class="label">space-5</div><div class="bar" style="width: 20px;">20</div>
    <div class="label">space-6</div><div class="bar" style="width: 24px;">24</div>
    <div class="label">space-8</div><div class="bar" style="width: 32px;">32</div>
    <div class="label">space-10</div><div class="bar" style="width: 40px;">40</div>
    <div class="label">space-12</div><div class="bar" style="width: 48px;">48</div>
    <div class="label">space-16</div><div class="bar" style="width: 64px;">64</div>
    <div class="label">space-20</div><div class="bar" style="width: 80px;">80</div>
    <div class="label">space-24</div><div class="bar" style="width: 96px;">96</div>
    <div class="label">space-32</div><div class="bar" style="width: 128px;">128</div>
  </div>
</body></html>
