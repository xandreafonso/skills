<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
    .swatch { display: flex; flex-direction: column; gap: 6px; }
    .chip { aspect-ratio: 1 / 1.05; border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.06); }
    .label { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-muted); display: flex; flex-direction: column; gap: 1px; }
    .label b { color: var(--color-fg); font-weight: 500; }
    .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .header h3 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .header span { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-subtle); letter-spacing: 0.04em; text-transform: uppercase; }
  </style>
  <div class="header"><h3>Neutrals</h3><span>cool-leaning · texto · bordas · superfícies</span></div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:var(--neutral-0)"></div><div class="label"><b>0</b>ffffff</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-50)"></div><div class="label"><b>50</b>f5f7fa</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-100)"></div><div class="label"><b>100</b>e6ebf2</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-200)"></div><div class="label"><b>200</b>c8d1de</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-300)"></div><div class="label"><b>300</b>9aa6b8</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-400)"></div><div class="label"><b>400</b>6c7a90</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-500)"></div><div class="label"><b>500</b>4a566a</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-600)"></div><div class="label"><b>600</b>313b4d</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-700)"></div><div class="label"><b>700</b>1f2737</div></div>
    <div class="swatch"><div class="chip" style="background:var(--neutral-800)"></div><div class="label"><b>800</b>131a27</div></div>
  </div>
</body></html>
