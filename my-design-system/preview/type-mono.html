<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    body { padding: 28px; display: flex; flex-direction: column; gap: 22px; }
    .row { display: flex; align-items: center; gap: 18px; }
    .meta { width: 96px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); display: flex; flex-direction: column; gap: 2px; }
    .meta b { color: var(--color-fg-muted); font-weight: 500; }
    code.sample { background: var(--color-bg-sunken); border: 1px solid var(--color-border); padding: 10px 14px; border-radius: var(--radius-md); font-family: var(--font-mono); color: var(--color-fg); }
  </style>
  <div class="row">
    <div class="meta"><b>eyebrow</b><span>12px · uppercase</span></div>
    <span style="font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-accent);">— 01 · Diagnóstico</span>
  </div>
  <div class="row">
    <div class="meta"><b>mono ui</b><span>13px · 500</span></div>
    <code class="sample" style="font-size: 13px;">agent.deploy --env prod --confirm</code>
  </div>
  <div class="row">
    <div class="meta"><b>mono micro</b><span>10px · uppercase</span></div>
    <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-fg-subtle);">CASE_STUDY · 003 · 2026-Q1</span>
  </div>
  <div class="row">
    <div class="meta"><b>tabular</b><span>números alinhados</span></div>
    <div style="font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-size: 18px; color: var(--color-fg); display: flex; gap: 24px;">
      <span>R$ 4.812.330</span><span>+38,7%</span><span>00:12:03</span>
    </div>
  </div>
</body></html>
