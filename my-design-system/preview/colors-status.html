<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .tok { padding: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); display: flex; flex-direction: column; gap: 10px; }
    .sw { height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-fg); font-weight: 500; }
    .val { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); }
    .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .header h3 { margin: 0; font-size: 14px; font-weight: 600; }
    .header span { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-subtle); letter-spacing: 0.04em; text-transform: uppercase; }
  </style>
  <div class="header"><h3>Status</h3><span>dessaturados · feedback discreto</span></div>
  <div class="grid">
    <div class="tok"><div class="sw" style="background: color-mix(in oklab, var(--color-success) 18%, transparent); color: var(--color-success)"><span class="dot"></span></div><div><div class="name">success</div><div class="val">#2da472</div></div></div>
    <div class="tok"><div class="sw" style="background: color-mix(in oklab, var(--color-warning) 18%, transparent); color: var(--color-warning)"><span class="dot"></span></div><div><div class="name">warning</div><div class="val">#d4a015</div></div></div>
    <div class="tok"><div class="sw" style="background: color-mix(in oklab, var(--color-danger) 18%, transparent); color: var(--color-danger)"><span class="dot"></span></div><div><div class="name">danger</div><div class="val">#c4474a</div></div></div>
    <div class="tok"><div class="sw" style="background: color-mix(in oklab, var(--color-info) 18%, transparent); color: var(--color-info)"><span class="dot"></span></div><div><div class="name">info</div><div class="val">#4d7cc2</div></div></div>
  </div>
</body></html>
