<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    body { padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .case-card h4 { margin: 0 0 6px; font-size: 16px; font-weight: 600; letter-spacing: -0.012em; }
    .case-card p { margin: 0; font-size: 13px; color: var(--color-fg-muted); line-height: 1.55; }
    .kicker { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 14px; }
    .stat { font-family: var(--font-mono); font-size: 32px; letter-spacing: -0.03em; color: var(--color-fg); font-variant-numeric: tabular-nums; margin: 12px 0 4px; }
    .stat span { font-size: 18px; color: var(--color-fg-muted); }
  </style>
  <div class="grid">
    <div class="card card--hover">
      <div class="kicker">— Case 002</div>
      <h4>Atendimento N1 com agente</h4>
      <p>Cobertura 24/7 com 4 humanos no time, contra os 11 previstos no plano original.</p>
    </div>
    <div class="card card--elevated">
      <div class="kicker">— Case 003</div>
      <div class="stat">−63<span>%</span></div>
      <p>Tempo médio de qualificação de leads B2B após a entrada do agente de pré-venda.</p>
    </div>
  </div>
</body></html>
