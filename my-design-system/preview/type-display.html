<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    .specimen { padding: 22px 0; border-bottom: 1px solid var(--color-border); display: flex; align-items: baseline; gap: 18px; }
    .specimen:last-child { border-bottom: none; }
    .meta { width: 96px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); display: flex; flex-direction: column; gap: 2px; }
    .meta b { color: var(--color-fg-muted); font-weight: 500; }
    .sample { color: var(--color-fg); letter-spacing: -0.025em; font-weight: 500; line-height: 1; }
  </style>
  <div class="specimen">
    <div class="meta"><b>display</b><span>112px / 500</span></div>
    <div class="sample" style="font-size: 88px;">Aa</div>
  </div>
  <div class="specimen">
    <div class="meta"><b>h1 / 4xl</b><span>48px / 600</span></div>
    <div class="sample" style="font-size: 48px; font-weight: 600;">Inteligência orgânica</div>
  </div>
  <div class="specimen">
    <div class="meta"><b>h2 / 3xl</b><span>38px / 600</span></div>
    <div class="sample" style="font-size: 38px; font-weight: 600;">Agentes que entregam</div>
  </div>
  <div class="specimen">
    <div class="meta"><b>h3 / 2xl</b><span>30px / 600</span></div>
    <div class="sample" style="font-size: 30px; font-weight: 600;">Diagnóstico estratégico</div>
  </div>
  <div class="specimen">
    <div class="meta"><b>h4 / xl</b><span>24px / 600</span></div>
    <div class="sample" style="font-size: 24px; font-weight: 600; letter-spacing: -0.012em;">Implementação assistida</div>
  </div>
</body></html>
