<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body>
  <style>
    body { padding: 28px; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box { width: 68px; height: 68px; background: var(--color-surface); border: 1px solid var(--color-border-strong); }
    .label { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-muted); text-align: center; }
    .label b { color: var(--color-fg); font-weight: 500; display: block; }
  </style>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius: var(--radius-xs)"></div><div class="label"><b>xs</b>2px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-sm)"></div><div class="label"><b>sm</b>4px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-md)"></div><div class="label"><b>md ★</b>6px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-lg)"></div><div class="label"><b>lg</b>10px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-xl)"></div><div class="label"><b>xl</b>14px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-2xl)"></div><div class="label"><b>2xl</b>20px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-pill)"></div><div class="label"><b>pill</b>full</div></div>
  </div>
  <p style="margin: 22px 0 0; font-size: 12px; color: var(--color-fg-subtle); line-height: 1.55;">
    Raios pequenos por padrão. <b style="color: var(--color-fg-muted)">md (6px)</b> para cards e botões; <b style="color: var(--color-fg-muted)">pill</b> apenas para badges, tags e dots. Sem raios maiores que 14px exceto em decorações.
  </p>
</body></html>
