<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Posts · Alexandre Afonso</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="BlogNav.jsx"></script>
  <script type="text/babel" src="PostCard.jsx"></script>
  <script type="text/babel" src="TagFilter.jsx"></script>
  <script type="text/babel" src="NewsletterCTA.jsx"></script>
  <script type="text/babel" src="BlogIndex.jsx"></script>
  <script type="text/babel" src="Article.jsx"></script>
  <script type="text/babel">
    const POSTS = [
      {
        slug: "modelo-vs-contexto",
        featured: true,
        category: "Diagnóstico",
        date: "12 mai 2026",
        readTime: 8,
        title: "Por que entender o processo costuma valer mais que escolher o modelo.",
        excerpt: "Quem chega querendo escolher o LLM antes de mapear o processo geralmente está resolvendo o problema errado. O contexto é o que decide se a solução vai funcionar.",
        cover: "diagnóstico",
      },
      {
        slug: "custo-token",
        category: "Operação",
        date: "28 abr 2026",
        readTime: 6,
        title: "O custo de uma solução com IA não aparece na demo.",
        excerpt: "Três decisões técnicas que mudam significativamente o custo mês a mês, com exemplos práticos.",
      },
      {
        slug: "automacao-pme",
        category: "Automação",
        date: "11 abr 2026",
        readTime: 12,
        title: "O que dá para automatizar com IA numa empresa de 10 a 100 pessoas.",
        excerpt: "Pequenos times têm mais a ganhar com automação do que se imagina. Quatro padrões que aparecem com frequência.",
      },
      {
        slug: "atendimento-agente",
        category: "Caso",
        date: "29 mar 2026",
        readTime: 10,
        title: "Como um agente passou a responder 70% dos tickets de uma software house.",
        excerpt: "Caso real, sem nomes, com os números antes e depois. Inclui o que não funcionou na primeira tentativa.",
      },
      {
        slug: "ferramentas-stack",
        category: "Arquitetura",
        date: "14 mar 2026",
        readTime: 14,
        title: "N8N, Kestra ou código próprio? Como decido a stack em cada projeto.",
        excerpt: "Não existe ferramenta padrão. O que importa são três critérios que aplico antes de escolher — explico cada um com exemplo.",
      },
    ];
    const TAGS = [
      { id: "all", label: "Todos", count: 18 },
      { id: "automacao", label: "Automação", count: 7 },
      { id: "agentes", label: "Agentes", count: 6 },
      { id: "casos", label: "Casos", count: 4 },
      { id: "custo", label: "Custo / operação", count: 3 },
      { id: "diagnostico", label: "Diagnóstico", count: 3 },
    ];

    function App() {
      const [mode, setMode] = React.useState("index");
      const [activePost, setActivePost] = React.useState(null);
      const [activeTag, setActiveTag] = React.useState("all");

      const openPost = (post) => { setActivePost(post); setMode("article"); window.scrollTo(0, 0); };
      const back = () => { setMode("index"); window.scrollTo(0, 0); };

      return (
        <>
          <BlogNav active="posts" mode={mode} onBack={back} />
          {mode === "index"
            ? <BlogIndex posts={POSTS} tags={TAGS} activeTag={activeTag} onTagChange={setActiveTag} onOpenPost={openPost} />
            : <Article post={activePost || POSTS[0]} />}
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
